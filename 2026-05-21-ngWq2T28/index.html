<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <title>说到做到的小水水</title>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none}
    #book{width:100%;height:100%;position:relative;overflow:hidden}
    #reel{display:flex;width:100%;height:100%;will-change:transform;transition:transform .35s cubic-bezier(.4,0,.2,1)}
    .slide{min-width:100vw;height:100%;position:relative;overflow:hidden;background:#000;flex-shrink:0}
    .slide-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top;display:block}
    .cover-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:0 24px max(40px,env(safe-area-inset-bottom));background:linear-gradient(to top,rgba(0,0,0,.72) 0%,rgba(0,0,0,.3) 45%,transparent 100%);pointer-events:none}
    .cover-title{font-family:"Ma Shan Zheng","STKaiti","KaiTi",serif;font-size:clamp(28px,8vw,52px);color:#fff8ee;letter-spacing:.14em;line-height:1.3;text-align:center;text-shadow:0 2px 16px rgba(0,0,0,.8),0 0 40px rgba(255,180,80,.35);margin-bottom:16px}
    .swipe-hint{font-size:13px;color:rgba(255,255,255,.55);letter-spacing:.1em;margin-bottom:8px;animation:pulse 2s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:.4}50%{opacity:.9}}
    .text-overlay{position:absolute;left:0;right:0;bottom:0;padding:18px 20px max(18px,env(safe-area-inset-bottom));background:linear-gradient(to top,rgba(0,0,0,.78) 0%,rgba(0,0,0,.5) 60%,transparent 100%);pointer-events:none}
    .narration{font-size:clamp(16px,4.5vw,22px);font-weight:500;color:#fff;line-height:1.7;text-align:center;text-shadow:0 1px 6px rgba(0,0,0,.6)}
    .dialogue{margin-top:6px;font-size:clamp(14px,3.8vw,18px);color:rgba(255,230,180,1);font-style:italic;text-align:center;text-shadow:0 1px 4px rgba(0,0,0,.5)}
    .pg-dot{position:absolute;top:max(14px,env(safe-area-inset-top));right:16px;font-size:12px;color:rgba(255,255,255,.45);font-weight:600;letter-spacing:.04em}
    .pg-total{font-weight:400;opacity:.7}
  </style>
</head>
<body>
<div id="book"><div id="reel"><div class="slide" data-page="0"><img class="slide-img" src="https://supercqz-dev.github.io/stories-viewer/2026-05-21-ngWq2T28/cover.png" alt="封面" loading="eager"/><div class="cover-overlay"><span class="cover-title">说到做到的小水水</span><span class="swipe-hint">向左滑动开始阅读</span></div></div><div class="slide" data-page="1"><img class="slide-img" src="https://supercqz-dev.github.io/stories-viewer/2026-05-21-ngWq2T28/page-1.png" alt="第1页" loading="lazy"/><div class="text-overlay"><p class="narration">水水在幼儿园里发现画笔盒不见了</p></div><div class="pg-dot">1<span class="pg-total">/8</span></div></div><div class="slide" data-page="2"><img class="slide-img" src="https://supercqz-dev.github.io/stories-viewer/2026-05-21-ngWq2T28/page-2.png" alt="第2页" loading="lazy"/><div class="text-overlay"><p class="narration">好朋友小熊说他借走了，没还</p><p class="dialogue">"你为什么不打招呼就拿走？"</p></div><div class="pg-dot">2<span class="pg-total">/8</span></div></div><div class="slide" data-page="3"><img class="slide-img" src="https://supercqz-dev.github.io/stories-viewer/2026-05-21-ngWq2T28/page-3.png" alt="第3页" loading="lazy"/><div class="text-overlay"><p class="narration">水水心里很不高兴，想走开不理他</p></div><div class="pg-dot">3<span class="pg-total">/8</span></div></div><div class="slide" data-page="4"><img class="slide-img" src="https://supercqz-dev.github.io/stories-viewer/2026-05-21-ngWq2T28/page-4.png" alt="第4页" loading="lazy"/><div class="text-overlay"><p class="narration">妈妈说，说出来才是解决问题</p><p class="dialogue">"你要直接告诉他你的感受"</p></div><div class="pg-dot">4<span class="pg-total">/8</span></div></div><div class="slide" data-page="5"><img class="slide-img" src="https://supercqz-dev.github.io/stories-viewer/2026-05-21-ngWq2T28/page-5.png" alt="第5页" loading="lazy"/><div class="text-overlay"><p class="narration">水水鼓起勇气，走向小熊</p><p class="dialogue">"你拿了我的画笔，我很不开心"</p></div><div class="pg-dot">5<span class="pg-total">/8</span></div></div><div class="slide" data-page="6"><img class="slide-img" src="https://supercqz-dev.github.io/stories-viewer/2026-05-21-ngWq2T28/page-6.png" alt="第6页" loading="lazy"/><div class="text-overlay"><p class="narration">小熊愣了一下，连忙道歉</p><p class="dialogue">"对不起，我以后会先问你的"</p></div><div class="pg-dot">6<span class="pg-total">/8</span></div></div><div class="slide" data-page="7"><img class="slide-img" src="https://supercqz-dev.github.io/stories-viewer/2026-05-21-ngWq2T28/page-7.png" alt="第7页" loading="lazy"/><div class="text-overlay"><p class="narration">两个人和好了，一起画画</p></div><div class="pg-dot">7<span class="pg-total">/8</span></div></div><div class="slide" data-page="8"><img class="slide-img" src="https://supercqz-dev.github.io/stories-viewer/2026-05-21-ngWq2T28/page-8.png" alt="第8页" loading="lazy"/><div class="text-overlay"><p class="narration">水水笑了，说出来真的管用！</p></div><div class="pg-dot">8<span class="pg-total">/8</span></div></div></div></div>
<script>
(function(){
  const reel=document.getElementById('reel');
  const TOTAL=9;
  let cur=0,sx=0,sy=0,dragging=false,startT=0;
  function tryFullscreen(){const el=document.documentElement;const req=el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen;if(req)req.call(el).catch(()=>{});}
  function go(n,a=true){n=Math.max(0,Math.min(n,TOTAL-1));if(!a){reel.style.transition='none';}reel.style.transform='translateX(-'+(n*100)+'vw)';if(!a){void reel.offsetWidth;reel.style.transition='';}cur=n;}
  reel.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;sy=e.touches[0].clientY;startT=Date.now();dragging=true;reel.style.transition='none';},{passive:true});
  reel.addEventListener('touchmove',function(e){if(!dragging)return;const dx=e.touches[0].clientX-sx;const dy=e.touches[0].clientY-sy;if(Math.abs(dy)>Math.abs(dx)&&Math.abs(dy)>10){dragging=false;reel.style.transition='';return;}reel.style.transform='translateX(calc(-'+(cur*100)+'vw + '+dx+'px))';},{passive:true});
  reel.addEventListener('touchend',function(e){if(!dragging){reel.style.transition='';return;}dragging=false;reel.style.transition='transform .35s cubic-bezier(.4,0,.2,1)';const dx=sx-e.changedTouches[0].clientX;const dt=Date.now()-startT;const fast=dt<250&&Math.abs(dx)>30;const far=Math.abs(dx)>window.innerWidth*0.3;if((fast||far)&&dx>0)go(cur+1);else if((fast||far)&&dx<0)go(cur-1);else go(cur);},{passive:true});
  document.addEventListener('keydown',function(e){if(e.key==='ArrowRight'||e.key===' ')go(cur+1);if(e.key==='ArrowLeft')go(cur-1);});
  document.addEventListener('click',tryFullscreen,{once:true});
  document.addEventListener('touchend',tryFullscreen,{once:true});
})();
</script>
</body>
</html>
