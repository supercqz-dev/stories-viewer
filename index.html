<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>水水的图书馆</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#000;min-height:100vh;color:#fff}
    .hero{width:100%;display:block;line-height:0}
    .hero img{width:100%;height:auto;display:block}
    .shelf{max-width:720px;margin:0 auto;padding:40px 16px 64px}
    .shelf-title{font-size:13px;font-weight:500;color:rgba(255,255,255,.35);margin-bottom:16px;padding-left:2px;letter-spacing:.08em}
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
    .book-card{text-decoration:none;background:#111;border-radius:14px;overflow:hidden;border:1px solid rgba(255,255,255,.07);transition:transform .15s;display:block}
    .book-card:active{transform:scale(.96)}
    .cover-wrap{width:100%;aspect-ratio:9/16;overflow:hidden;background:#1a1a1a}
    .cover-wrap img{width:100%;height:100%;object-fit:cover;display:block}
    .book-info{padding:10px 12px 12px;background:#111}
    .book-title{font-size:clamp(13px,3.6vw,15px);font-weight:600;color:#f0f0f0;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .book-date{font-size:10px;color:rgba(255,255,255,.3);margin-top:5px}
  </style>
</head>
<body>
  <div class="hero"><img src="https://supercqz-dev.github.io/stories-viewer/library-header.png" alt="水水的图书馆"/></div>
  <div class="shelf">
    <p class="shelf-title">全部故事 · 2 本</p>
    <div class="grid"><a class="book-card" href="https://supercqz-dev.github.io/stories-viewer/2026-05-21-ngWq2T28/"><div class="cover-wrap"><img src="https://supercqz-dev.github.io/stories-viewer/2026-05-21-ngWq2T28/cover.png" alt="说到做到的小水水" loading="lazy"/></div><div class="book-info"><p class="book-title">说到做到的小水水</p><p class="book-date">2026年5月21日</p></div></a><a class="book-card" href="https://supercqz-dev.github.io/stories-viewer/2026-05-21-vPqFZUHh/"><div class="cover-wrap"><img src="https://supercqz-dev.github.io/stories-viewer/2026-05-21-vPqFZUHh/cover.png" alt="水水保护小兔子" loading="lazy"/></div><div class="book-info"><p class="book-title">水水保护小兔子</p><p class="book-date">2026年5月21日</p></div></a></div>
  </div>
</body>
</html>
