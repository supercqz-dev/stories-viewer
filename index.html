<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>水水的图书馆</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#fdf4ec;min-height:100vh}

    /* ── 头部 ── */
    .hero{
      position:relative;
      width:100%;
      padding-top:56.25%; /* 16:9 */
      background:url(header.png) center/cover no-repeat;
      overflow:hidden;
    }
    .hero-overlay{
      position:absolute;inset:0;
      background:linear-gradient(to bottom,rgba(0,0,0,.08) 0%,rgba(0,0,0,.32) 85%,rgba(253,244,236,1) 100%);
      display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
      padding:0 20px 32px;
      text-align:center;
    }
    
    .hero-title{
      font-size:clamp(26px,7vw,48px);
      color:#fff;
      font-weight:700;
      text-shadow:0 2px 16px rgba(100,40,0,.45),0 0 40px rgba(255,160,80,.3);
      letter-spacing:.08em;
      line-height:1.25;
    }
    .hero-sub{
      margin-top:8px;
      font-size:clamp(12px,2.8vw,15px);
      color:rgba(255,255,255,.85);
      letter-spacing:.1em;
    }

    /* ── 书架区 ── */
    .shelf{
      max-width:700px;margin:0 auto;
      padding:22px 14px 40px;
    }
    .shelf-title{
      font-size:15px;font-weight:600;color:#9c6a40;
      margin-bottom:14px;padding-left:2px;letter-spacing:.05em;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:14px;
    }
    .book-card{
      text-decoration:none;
      background:#fff;
      border-radius:14px;
      overflow:hidden;
      box-shadow:0 3px 14px rgba(180,100,40,.1);
      transition:transform .15s,box-shadow .15s;
    }
    .book-card:active{transform:scale(.97);}
    /* 9:16 封面 */
    .cover-wrap{
      width:100%;
      aspect-ratio:9/16;
      overflow:hidden;
      background:#f5efe8;
    }
    .cover-wrap img{width:100%;height:100%;object-fit:cover;}
    .book-info{padding:9px 11px 11px;}
    .book-title{
      font-size:clamp(12px,3.2vw,15px);
      font-weight:600;color:#3d2b1f;
      line-height:1.4;
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
    }
    .book-date{font-size:11px;color:#bba08a;margin-top:4px;}

    .empty{text-align:center;color:#bba08a;padding:60px 20px;font-size:15px;}
  </style>
</head>
<body>
  <!-- 头部插画 -->
  <div class="hero">
    <div class="hero-overlay">
      <div class="hero-title">水水的图书馆</div>
      <div class="hero-sub">专属原创故事 · 爸爸妈妈用爱制作</div>
    </div>
  </div>

  <!-- 书架 -->
  <div class="shelf">
    <p class="shelf-title">全部故事 · 2 本</p>
    <div class="grid">
      
    <a class="book-card" href="https://supercqz-dev.github.io/stories-viewer/2026-05-21-ngWq2T28/">
      <div class="cover-wrap">
        <img src="https://supercqz-dev.github.io/stories-viewer/2026-05-21-ngWq2T28/cover.png" alt="说到做到的小水水" loading="lazy"/>
      </div>
      <div class="book-info">
        <p class="book-title">说到做到的小水水</p>
        <p class="book-date">2026/5/21</p>
      </div>
    </a>

    <a class="book-card" href="https://supercqz-dev.github.io/stories-viewer/2026-05-21-vPqFZUHh/">
      <div class="cover-wrap">
        <img src="https://supercqz-dev.github.io/stories-viewer/2026-05-21-vPqFZUHh/cover.png" alt="2026-05-21-vPqFZUHh" loading="lazy"/>
      </div>
      <div class="book-info">
        <p class="book-title">2026-05-21-vPqFZUHh</p>
        <p class="book-date">2026/5/21</p>
      </div>
    </a>
    </div>
  </div>
</body>
</html>
